<div class="detail-container container fade-in" *ngIf="!loading && job">
  <a routerLink="/" class="back-link">
    <i class="fas fa-arrow-left"></i> Back to Jobs
  </a>

  <div class="detail-card">
    <div class="detail-header">
      <div class="company-avatar" [ngClass]="sourceClass">
        {{ job.company?.charAt(0)?.toUpperCase() }}
      </div>
      <div>
        <h1 class="detail-title">{{ job.title }}</h1>
        <p class="detail-company">{{ job.company }}</p>
      </div>
    </div>

    <div class="detail-meta">
      <span class="meta"><i class="fas fa-map-marker-alt"></i> {{ job.location }}</span>
      <span class="meta"><i class="fas fa-layer-group"></i> {{ job.experienceLevel }}</span>
      <span class="meta"><i class="fas fa-plug"></i> {{ job.source }}</span>
    </div>

    <a [href]="job.jobUrl" target="_blank" rel="noopener" class="apply-btn">
      <i class="fas fa-external-link-alt"></i> Apply Now
    </a>

    <div class="description" *ngIf="job.description">
      <h2>Job Description</h2>
      <p>{{ job.description }}</p>
    </div>
  </div>
</div>

<div class="loading-state" *ngIf="loading">
  <div class="skeleton" style="height: 40px; width: 300px; margin-bottom: 20px;"></div>
  <div class="skeleton" style="height: 24px; width: 200px; margin-bottom: 40px;"></div>
  <div class="skeleton" style="height: 200px; width: 100%;"></div>
</div>
