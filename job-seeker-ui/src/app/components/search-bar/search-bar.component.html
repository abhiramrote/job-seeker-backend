<div class="search-container">
  <div class="search-grid">
    <div class="input-group">
      <i class="fas fa-search"></i>
      <input type="text" placeholder="Job title, keywords..." [(ngModel)]="keywords" (input)="onInputChange()">
    </div>
    <div class="input-group">
      <i class="fas fa-map-marker-alt"></i>
      <input type="text" placeholder="Location..." [(ngModel)]="location" (input)="onInputChange()">
    </div>
    <div class="input-group">
      <i class="fas fa-layer-group"></i>
      <select [(ngModel)]="experienceLevel" (change)="onInputChange()">
        <option value="">All Levels</option>
        <option *ngFor="let level of experienceLevels.slice(1)" [value]="level">{{ level }}</option>
      </select>
    </div>
    <div class="input-group">
      <i class="fas fa-building"></i>
      <input type="text" placeholder="Company..." [(ngModel)]="company" (input)="onInputChange()">
    </div>
  </div>
  <button class="clear-btn" *ngIf="keywords || location || experienceLevel || company" (click)="clearFilters()">
    <i class="fas fa-times"></i> Clear Filters
  </button>
</div>
