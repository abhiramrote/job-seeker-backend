<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-icon"><i class="fas fa-briefcase"></i></div>
    <div class="stat-info">
      <span class="stat-value">{{ totalJobs }}</span>
      <span class="stat-label">Total Jobs</span>
    </div>
  </div>
  <div class="stat-item">
    <div class="stat-icon company"><i class="fas fa-building"></i></div>
    <div class="stat-info">
      <span class="stat-value">{{ uniqueCompanies }}</span>
      <span class="stat-label">Companies</span>
    </div>
  </div>
  <div class="stat-item">
    <div class="stat-icon source"><i class="fas fa-plug"></i></div>
    <div class="stat-info">
      <span class="stat-value">{{ sources.length }}</span>
      <span class="stat-label">Sources</span>
    </div>
  </div>
  <div class="stat-item">
    <div class="stat-icon senior"><i class="fas fa-star"></i></div>
    <div class="stat-info">
      <span class="stat-value">{{ seniorJobs }}</span>
      <span class="stat-label">Senior Roles</span>
    </div>
  </div>
</div>
