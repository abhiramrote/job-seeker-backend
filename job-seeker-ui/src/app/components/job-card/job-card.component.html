<div class="job-card" [style.animation-delay]="(index * 0.05) + 's'">
  <div class="card-header">
    <div class="company-avatar" [attr.data-source]="sourceClass">
      {{ companyInitial }}
    </div>
    <div class="header-info">
      <h3 class="job-title">{{ job.title }}</h3>
      <p class="company-name">{{ job.company }}</p>
    </div>
  </div>

  <div class="card-meta">
    <span class="meta-item"><i class="fas fa-map-marker-alt"></i> {{ job.location || 'Remote' }}</span>
    <span class="meta-item"><i class="fas fa-clock"></i> {{ timeAgo }}</span>
  </div>

  <div class="card-badges">
    <span class="badge source" [ngClass]="sourceClass">{{ job.source }}</span>
    <span class="badge level" [ngClass]="levelClass" *ngIf="job.experienceLevel && job.experienceLevel !== 'Not specified'">
      {{ job.experienceLevel }}
    </span>
    <span class="badge match" *ngIf="job.matchScore">{{ job.matchScore }}% match</span>
  </div>

  <p class="card-desc" *ngIf="job.description">
    {{ job.description | slice:0:150 }}{{ job.description.length > 150 ? '...' : '' }}
  </p>

  <div class="card-actions">
    <a [routerLink]="['/job', job.id]" class="btn btn-detail">
      <i class="fas fa-eye"></i> Details
    </a>
    <a [href]="job.jobUrl" target="_blank" rel="noopener" class="btn btn-apply">
      <i class="fas fa-external-link-alt"></i> Apply
    </a>
  </div>
</div>
