<!-- Loading Skeletons -->
<div class="job-grid" *ngIf="loading">
  <div class="skeleton-card" *ngFor="let i of [1,2,3,4,5,6]">
    <div class="skeleton skeleton-avatar"></div>
    <div class="skeleton skeleton-title"></div>
    <div class="skeleton skeleton-line"></div>
    <div class="skeleton skeleton-line short"></div>
  </div>
</div>

<!-- Job Grid -->
<div class="job-grid" *ngIf="!loading && jobs.length > 0">
  <app-job-card *ngFor="let job of visibleJobs; let i = index" [job]="job" [index]="i"></app-job-card>
</div>

<!-- Load More -->
<div class="load-more" *ngIf="!loading && hasMore">
  <button class="btn-load-more" (click)="loadMore()">
    <i class="fas fa-arrow-down"></i>
    Load More ({{ jobs.length - visibleCount }} remaining)
  </button>
</div>

<!-- Empty State -->
<div class="empty-state" *ngIf="!loading && jobs.length === 0">
  <i class="fas fa-search"></i>
  <h3>No jobs found</h3>
  <p>Try adjusting your filters or scrape new jobs from the portals.</p>
</div>
